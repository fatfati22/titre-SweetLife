<!doctype html>
<html lang="fr" class="theme-calme">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SweetLife</title>

        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans&family=Cormorant+Garamond&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="../css/style.css" />
    </head>

    <body class="theme-calme">
        <header>
            <nav class="navbar glass">
                <img class="img" src="../image/logo.png" alt="logo SweetLife" />

                <ul class="nav-links">
                    <li><a href="#">🏠 Accueil</a></li>
                    <li><a href="#">🧘 Exercices</a></li>
                    <li><a href="#">🥗 Repas</a></li>
                    <li><a href="#">📊 Historique</a></li>
                    <li><a href="#">👤 Profil</a></li>
                </ul>

                <button class="btn-primary">Connexion</button>
            </nav>
        </header>

        <main>
            <section class="hero">
                <article class="hero-content">
                    <section>
                        <h1>Comment vas-tu</h1>
                        <h1 class="couleur">aujourd’hui ?</h1>

                        <p>
                            Choisis ton humeur pour recevoir des
                            recommandations.
                        </p>

                        <button class="btn-primary marg">
                            Choisir mon humeur
                        </button>
                        <button class="btn-ghost">Mon profil</button>
                    </section>

                    <!-- FLEUR -->
                    <section class="mood-wheel">
                        <button
                            class="mood-btn"
                            onclick="setTheme('theme-joie')"
                        >
                            😊
                        </button>
                        <button
                            class="mood-btn"
                            onclick="setTheme('theme-tristesse')"
                        >
                            😢
                        </button>
                        <button
                            class="mood-btn"
                            onclick="setTheme('theme-colere')"
                        >
                            😠
                        </button>
                        <button
                            class="mood-btn"
                            onclick="setTheme('theme-fatigue')"
                        >
                            😴
                        </button>
                        <button
                            class="mood-btn"
                            onclick="setTheme('theme-calme')"
                        >
                            😌
                        </button>
                        <button
                            class="mood-btn"
                            onclick="setTheme('theme-stress')"
                        >
                            😰
                        </button>

                        <!-- CENTRE -->
                        <button class="mood-btn center">🌸</button>
                    </section>
                </article>
            </section>

            <section class="today-section">
                <article class="glass-card">
                    <blockquote class="quote-text">
                        « La paix intérieure commence quand tu t’écoutes
                        vraiment. »
                    </blockquote>
                    <p class="quote-author">— Inspiration du jour</p>
                </article>
            </section>
        </main>

        <footer class="glass-card">
            <img src="../image/logo.png" alt="logo footer" />
            <p>site Public</p>
            <p>Panel admin V2.SweetLife2025</p>
        </footer>

        <script>
            function setTheme(theme) {
                document.body.className = theme;
            }
        </script>
    </body>
</html>
