<!doctype html>
<html lang="fr" class="theme-calme">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SweetLife</title>

        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans&family=Cormorant+Garamond&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="../css/pied-de-page.css" />
        <link rel="stylesheet" href="../css/element-theme.css" />
        <link rel="stylesheet" href="../css/theme.css" />
        <link rel="stylesheet" href="../css/position-cercle-emojis.css" />
        <link rel="stylesheet" href="../css/barre-navigation.css" />
        <link rel="stylesheet" href="../css/theme-initial.css" />
        <link rel="stylesheet" href="../css/style.css" />
    </head>

    <body class="theme-calme">
        <header>
            <nav class="navbar glass">
                <img class="img" src="../image/logo.png" alt="logo SweetLife" />

                <ul class="nav-links">
                    <li><a href="index.html" class="actif">🏠 Accueil</a></li>
                    <li><a href="exercice.html">🧘 Exercices</a></li>
                    <li><a href="repas.html">🥗 Repas</a></li>
                    <li><a href="historique.html">📊 Historique</a></li>
                    <li><a href="Profil.html">👤 Profil</a></li>
                </ul>
            </nav>
        </header>
        <!-- BOUTON INSCRIPTION FIXE EN HAUT À DROITE -->
        <a class="btn-inscription-fixe" href="inscription.html">
            <button class="btn-primary" type="button">s'inscrire</button>
        </a>

        <main>
            <section class="hero">
                <article class="hero-content">
                    <img
                        class="mobile"
                        src="../image/logo.png"
                        alt="le logo de site SweetLife"
                    />
                    <section class="centrer">
                        <h1>
                            Comment vas-tu
                            <span class="couleur">aujourd’hui ?</span>
                        </h1>

                        <p>
                            Choisis ton humeur pour recevoir des
                            recommandations.
                        </p>

                        <div class="alig">
                            <button class="btn-primary marg">
                                🌸 Choisir mon humeur
                            </button>
                            <button class="btn-ghost">
                                <a href="oubli.html">
                                    😬 vous avez oublier de noter votre
                                    humeurs</a
                                >
                            </button>
                        </div>
                    </section>

                    <!-- FLEUR -->
                    <section class="mood-wheel">
                        <button
                            class="mood-btn"
                            onclick="setTheme('theme-joie')"
                        >
                            😊
                        </button>
                        <button
                            class="mood-btn"
                            onclick="setTheme('theme-tristesse')"
                        >
                            😢
                        </button>
                        <button
                            class="mood-btn"
                            onclick="setTheme('theme-colere')"
                        >
                            😠
                        </button>
                        <button
                            class="mood-btn"
                            onclick="setTheme('theme-fatigue')"
                        >
                            😴
                        </button>
                        <button
                            class="mood-btn"
                            onclick="setTheme('theme-calme')"
                        >
                            😌
                        </button>
                        <button
                            class="mood-btn"
                            onclick="setTheme('theme-stress')"
                        >
                            😰
                        </button>

                        <!-- CENTRE -->
                        <button class="mood-btn center">🌸</button>
                    </section>
                </article>
            </section>
        </main>

        <footer class="glass-card">
            <img src="../image/logo.png" alt="logo footer" />
            <p>site Public</p>
            <p>Panel admin V3.SweetLife2025</p>
        </footer>

        <script>
            function setTheme(theme) {
                document.body.className = theme;
            }
        </script>
    </body>
</html>
