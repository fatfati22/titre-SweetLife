<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SweetLife – Inscription</title>
        <link rel="stylesheet" href="../css/inscription.css" />
    </head>
    <body>
        <!-- Éléments décoratifs flottants -->
        <div class="flottant flottant-1"></div>
        <div class="flottant flottant-2"></div>

        <!-- Checkbox cachée pour menu burger -->
        <input type="checkbox" id="menu-toggle" style="display: none" />

        <!-- Page d'inscription -->
        <div class="page-inscription">
            <div class="carte">
                <div class="logo-carte">
                    <img src="../image/logo.png" alt="logo de site SweetLife" />
                    <h1>Sweet<span>life</span></h1>
                    <p>Ton espace bien-être & émotions</p>
                </div>

                <div class="avantages">
                    <p>Suivi de tes humeurs au quotidien</p>
                    <p>Exercices & repas adaptés à toi</p>
                    <p>Citations inspirantes personnalisées</p>
                </div>

                <!-- Champ Prénom & Nom -->
                <div class="champ">
                    <label>Prénom & Nom</label>
                    <input type="text" placeholder="Sophie Martin" />
                </div>

                <!-- Champ Email -->
                <div class="champ">
                    <label>Adresse e-mail</label>
                    <input type="email" placeholder="sophie@email.com" />
                </div>

                <!-- Champ Mot de passe -->
                <div class="champ">
                    <label
                        >Mot de passe
                        <span style="font-weight: normal"
                            >(minimum 6 caractères)</span
                        ></label
                    >
                    <input type="password" placeholder="••••••••" />
                </div>

                <!-- Champ Confirmation -->
                <div class="champ">
                    <label>Confirmer le mot de passe</label>
                    <input type="password" placeholder="••••••••" />
                </div>

                <!-- Bouton créer un compte -->
                <button class="btn-submit">🌸 Créer mon compte</button>

                <div class="lien-connexion">
                    Déjà membre ? <a href="connexion.html">Se connecter</a>
                </div>

                <div class="retour">
                    <a href="index.html">← Retour à l'accueil</a>
                </div>
            </div>
        </div>
    </body>
</html>
