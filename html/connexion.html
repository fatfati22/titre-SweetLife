<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" contenu="width=device-width, initial-scale=1.0" />
        <titre>SweetLife – Connexion</titre>
        <link rel="stylesheet" href="../css/theme-initial.css" />
        <link rel="stylesheet" href="../css/authentification.css" />
    </head>
    <body>
        <!-- Éléments décoratifs flottants -->
        <div class="flottant flottant-1"></div>
        <div class="flottant flottant-2"></div>

        <!-- Checkbox cachée pour menu burger -->
        <input type="checkbox" id="menu-toggle" style="display: none" />

        <!-- Page de connexion -->
        <div class="page-connexion">
            <div class="carte">
                <div class="logo-carte">
                    <img src="../image/logo.png" alt="logo de site SweetLife" />
                    <h1>Sweet<span>life</span></h1>
                    <span>Bon Retour 🌸</span>
                    <p>Ton espace bien-être & émotions</p>

                    <p>Connecte-toi à ton espace bien-être</p>
                </div>

                <div class="carte-info">
                    <p>Retrouve ton suivi émotionnel</p>
                    <p>Accède à tes exercices personnalisés</p>
                    <p>Continue ton voyage bien-être</p>
                </div>

                <!-- Champ Email -->
                <div class="champ">
                    <label>Adresse e-mail</label>
                    <input type="email" placeholder="sophie@email.com" />
                </div>

                <!-- Champ Mot de passe -->
                <div class="champ">
                    <label>Mot de passe</label>
                    <input type="password" placeholder="••••••••" />
                </div>

                <!-- Options : Se souvenir + Mot de passe oublié -->
                <div class="options">
                    <label class="souvenir-moi">
                        <input type="checkbox" /> Se souvenir de moi
                    </label>
                    <a href="#" class="mot-passe-oublie"
                        >Mot de passe oublié ?</a
                    >
                </div>

                <!-- Bouton se connecter -->
                <button class="btn-envoyer">🌸 Se connecter</button>

                <div class="lien-sinscrire">
                    Pas encore membre ?
                    <a href="inscription.html">Créer un compte</a>
                </div>

                <div class="retour">
                    <a href="index.html">← Retour à l'accueil</a>
                </div>
            </div>
        </div>
    </body>
</html>
