<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Carte Emotion</title>
        <link rel="stylesheet" href="../css/themeInitial.css" />
        <link rel="stylesheet" href="../css/note.css" />
    </head>

    <body>
        <div class="carte">
            <div class="emotion">😌</div>

            <h1 class="titre">Tu te sens : Calme</h1>

            <p class="texte-info">
                Ajoute une note sur ce qui se passe (10 car. min.)
            </p>

            <textarea
                class="zone-message"
                placeholder="Que se passe-t-il en ce moment ?"
            ></textarea>

            <div class="compteur">0/300</div>

            <div class="zone-boutons">
                <button class="bouton-annuler">Annuler</button>

                <button class="bouton-enregistrer">Enregistrer ↻</button>
            </div>
        </div>
    </body>
</html>
