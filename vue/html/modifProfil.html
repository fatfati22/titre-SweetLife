<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Modifier mon profil</title>

        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="../css/navbar.css" />
        <link rel="stylesheet" href="../css/theme-initial.css" />
        <link rel="stylesheet" href="../css/element-theme.css" />
        <link rel="stylesheet" href="../css/style.css" />
        <link rel="stylesheet" href="../css/humeur.css" />
        <link rel="stylesheet" href="../css/theme.css" />
        <link rel="stylesheet" href="../css/modifProfil.css" />
    </head>

    <body>
        <div class="container">
            <h1 class="page-title">✏️ Modifier mon profil</h1>

            <div class="card">
                <div class="profile-section">
                    <div class="avatar">S</div>

                    <div class="profile-info">
                        <h5>PHOTO DE PROFIL</h5>

                        <p>Téléchargez une photo ou utilisez vos initiales</p>

                        <div class="profile-buttons">
                            <button class="btn-image">
                                📷 Choisir une image
                            </button>

                            <button class="btn-delete">🗑 Supprimer</button>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="row">
                        <div class="field">
                            <label>PRÉNOM</label>
                            <input type="text" value="Sophie" />
                        </div>

                        <div class="field">
                            <label>NOM</label>
                            <input type="text" value="Leblanc" />
                        </div>
                    </div>

                    <div class="row">
                        <div class="field full">
                            <label>ADRESSE EMAIL</label>
                            <input
                                type="email"
                                value="sophie.leblanc@email.com"
                            />
                        </div>
                    </div>

                    <div class="row">
                        <div class="field">
                            <label>DATE DE NAISSANCE</label>
                            <input type="date" value="1990-05-15" />
                        </div>

                        <div class="field">
                            <label>GENRE</label>
                            <select>
                                <option>Femme</option>
                                <option>Homme</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="field">
                            <label>TÉLÉPHONE (OPTIONNEL)</label>
                            <input type="text" value="06 12 34 56 78" />
                        </div>

                        <div></div>
                    </div>

                    <div class="row">
                        <div class="field full">
                            <label>BIO / À PROPOS DE MOI</label>

                            <textarea class="bio">
                                    Passionnée de yoga et de méditation. Je cherche à cultiver la sérénité au quotidien et à partager des moments de bien-être avec la communauté SweetLife.</textarea
                            >
                        </div>
                    </div>
                </div>

                <div class="footer">
                    <button class="cancel-btn">❌ Annuler</button>

                    <button class="save-btn">
                        💾 Enregistrer les modifications
                    </button>
                </div>
            </div>
        </div>
    </body>
</html>
